<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f2f3f5" />
  <title>오싹오싹 커뮤니티</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/css/style.css?v=5" />
</head>
<body>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-inner">
      <h1 class="logo">
        <span class="logo-icon" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 6C18 6 22 10.5 22 14C22 14 23.5 12 23 10
                     C26 12.5 28 16 28 20C28 24.4 23.4 28 18 28
                     C12.6 28 8 24.4 8 20C8 16.5 10 13.5 13 11.5
                     C13 13.5 14 15 15.5 16C15.5 16 14 13 18 6Z"
                  fill="#7C6FF7"/>
          </svg>
        </span>
        오싹오싹 커뮤니티
      </h1>
      <div class="weather-info" id="weatherInfo"></div>
      <button class="refresh-btn" id="refreshBtn" title="새로고침">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- 메인 탭 -->
  <nav class="main-tabs">
    <button class="main-tab active" data-section="news">뉴스</button>
    <button class="main-tab" data-section="community">커뮤니티</button>
    <button class="main-tab" data-section="hotdeal">핫딜</button>
  </nav>

  <!-- ===== 뉴스 섹션 ===== -->
  <section id="news-section" class="section active">
    <div class="sub-tabs-bar">
      <nav class="sub-tabs">
        <button class="sub-tab active" data-source="ent">연예</button>
        <button class="sub-tab" data-source="society">사회</button>
        <button class="sub-tab" data-source="economy">경제</button>
        <button class="sub-tab" data-source="stocks">증권</button>
        <button class="sub-tab" data-source="realestate">부동산</button>
        <button class="sub-tab" data-source="world">세계</button>
        <button class="sub-tab" data-source="it">IT</button>
        <button class="sub-tab" data-source="sports">스포츠</button>
        <button class="sub-tab" data-source="game">게임</button>
      </nav>
      <button class="edit-tabs-btn" data-section="news" title="탭 순서 편집">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="list-container" id="news-list">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
    <div class="sentinel" id="news-sentinel"></div>
  </section>

  <!-- ===== 커뮤니티 섹션 ===== -->
  <section id="community-section" class="section">
    <div class="sub-tabs-bar">
      <nav class="sub-tabs">
        <button class="sub-tab active" data-source="bobaedream">보배드림</button>
        <button class="sub-tab" data-source="todayhumor">오늘의유머</button>
        <button class="sub-tab" data-source="ruliweb">루리웹</button>
        <button class="sub-tab" data-source="ppomppu">뽐뿌</button>
        <button class="sub-tab" data-source="inven">인벤</button>
        <button class="sub-tab" data-source="theqoo">더쿠</button>
        <button class="sub-tab" data-source="dcinside">디시</button>
        <button class="sub-tab" data-source="fmkorea">에펨코리아</button>
        <button class="sub-tab" data-source="mlbpark">MLB파크</button>
        <button class="sub-tab" data-source="clien">클리앙</button>
        <button class="sub-tab" data-source="instiz">인스티즈</button>
      </nav>
      <button class="edit-tabs-btn" data-section="community" title="탭 순서 편집">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="list-container" id="community-list">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
    <div class="sentinel" id="community-sentinel"></div>
  </section>

  <!-- ===== 핫딜 섹션 ===== -->
  <section id="hotdeal-section" class="section">
    <div class="sub-tabs-bar">
      <nav class="sub-tabs">
        <button class="sub-tab active" data-source="ppomppu">뽐뿌</button>
        <button class="sub-tab" data-source="clien">클리앙</button>
      </nav>
      <button class="edit-tabs-btn" data-section="hotdeal" title="탭 순서 편집">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="list-container" id="hotdeal-list">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
    <div class="sentinel" id="hotdeal-sentinel"></div>
  </section>

  <!-- 업데이트 시간 -->
  <footer class="footer">
    <span id="update-time"></span>
  </footer>

  <!-- ===== 탭 순서 편집 바텀시트 ===== -->
  <div class="sheet-backdrop" id="tabSheet" hidden>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <span class="sheet-title">탭 순서 편집</span>
        <button class="sheet-close" id="tabSheetClose">✕</button>
      </div>
      <ul class="sheet-list" id="tabSheetList"></ul>
      <div class="sheet-footer">
        <button class="sheet-done" id="tabSheetDone">완료</button>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js?v=7"></script>
</body>
</html>
