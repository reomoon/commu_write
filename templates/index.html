<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>오싹오싹 커뮤니티</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-inner">
      <h1 class="logo">
        <!-- 불꽃 SVG 아이콘 -->
        <span class="logo-icon" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="36" rx="9" fill="#FF5A1F"/>
            <path d="M18 6C18 6 22 10.5 22 14C22 14 23.5 12 23 10
                     C26 12.5 28 16 28 20C28 24.4 23.4 28 18 28
                     C12.6 28 8 24.4 8 20C8 16.5 10 13.5 13 11.5
                     C13 13.5 14 15 15.5 16C15.5 16 14 13 18 6Z"
                  fill="white"/>
            <path d="M18 18C18 18 20 20 20 22C20 23.1 19.1 24 18 24
                     C16.9 24 16 23.1 16 22C16 20.5 17 19 18 18Z"
                  fill="#FFD580"/>
          </svg>
        </span>
        오싹오싹 커뮤니티
      </h1>
      <button class="refresh-btn" id="refreshBtn" title="새로고침">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- 메인 탭: 커뮤니티 / 뉴스 -->
  <nav class="main-tabs">
    <button class="main-tab active" data-section="community">커뮤니티</button>
    <button class="main-tab" data-section="news">뉴스</button>
  </nav>

  <!-- ===== 커뮤니티 섹션 ===== -->
  <section id="community-section" class="section active">
    <nav class="sub-tabs">
      <button class="sub-tab active" data-source="bobaedream">보배드림</button>
      <button class="sub-tab" data-source="fmkorea">에펨코리아</button>
      <button class="sub-tab" data-source="dogdrip">개드립</button>
      <button class="sub-tab" data-source="ruliweb">루리웹</button>
      <button class="sub-tab" data-source="inven">인벤</button>
    </nav>
    <div class="list-container" id="community-list">
      <div class="skeleton-list">
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
      </div>
    </div>
    <div class="sentinel" id="community-sentinel"></div>
  </section>

  <!-- ===== 뉴스 섹션 ===== -->
  <section id="news-section" class="section">
    <nav class="sub-tabs">
      <button class="sub-tab active" data-source="ent">연예</button>
      <button class="sub-tab" data-source="society">사회</button>
      <button class="sub-tab" data-source="economy">경제</button>
      <button class="sub-tab" data-source="world">세계</button>
      <button class="sub-tab" data-source="it">IT</button>
      <button class="sub-tab" data-source="game">게임</button>
    </nav>
    <div class="list-container" id="news-list">
      <div class="skeleton-list">
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
      </div>
    </div>
    <div class="sentinel" id="news-sentinel"></div>
  </section>

  <!-- 업데이트 시간 -->
  <footer class="footer">
    <span id="update-time"></span>
  </footer>

  <script src="/static/js/app.js"></script>
</body>
</html>
